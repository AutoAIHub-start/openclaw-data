name: 오픈클로 일일 리포트
on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:
jobs:
  daily-report:
    name: 일일 판매 리포트 생성 및 발송
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4
      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
      - name: 패키지 설치
        run: pip install -r requirements.txt
      - name: 일일 데이터 수집
        env:
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python scripts/naver_trend.py
      - name: 미러 분석
        env:
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python scripts/mirror_analysis.py
      - name: 텔레그램 발송
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          python - <<'EOF'
          import json, os, requests
          from datetime import datetime
          with open('data/mirror_trend.json', 'r', encoding='utf-8') as f:
              mirror = json.load(f)
          today = datetime.now().strftime('%Y-%m-%d %H:%M')
          report = f"📊 수입차 미러 일일 리포트\n\n⏰ 수집: {mirror.get('updated', today)}\n\n"
          for r in mirror.get('results', []):
              if not r or r.get('total', 0) == 0:
                  continue
              d = r.get('total', 0)
              dot = '🟢' if d >= 5000 else '🟡' if d >= 1000 else '🔴'
              report += f"{dot} {r['brand']} {r['part']}: {r['total']:,}개 | 평균 {r.get('avg',0):,}원\n"
          report += f"\n🌐 대시보드: https://autoaihub-start.github.io/openclaw-data/dashboard.html"
          token = os.environ['TG_TOKEN']
          chat_id = os.environ['CHAT_ID']
          requests.post(f"https://api.telegram.org/bot{token}/sendMessage",
              json={"chat_id": chat_id, "text": report})
          print("텔레그램 발송 완료")
          EOF
      - name: 변경사항 커밋
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/
          git diff --staged --quiet || git commit -m "Auto update: $(date +'%Y-%m-%d %H:%M')"
          git push
        continue-on-error: true
