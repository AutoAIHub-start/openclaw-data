name: OpenClaw CI

on:
  push:
    branches: ["main", "dev"]
    paths:
      - "skills/**"
      - "*.py"
      - "requirements.txt"
  pull_request:
    branches: ["main"]

jobs:
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Check skills syntax
        run: |
          find skills/ -name "*.py" | while read f; do
            echo "Checking: $f"
            python -c "
import ast, sys
with open('$f', 'r', encoding='utf-8') as fh:
    src = fh.read()
try:
    ast.parse(src)
    print('  OK: ' + '$f')
except SyntaxError as e:
    print('  ERROR: ' + str(e))
    sys.exit(1)
"
          done

      - name: Dry run main logic
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          DRY_RUN: "true"
        run: |
          python main.py --dry-run || python app.py --dry-run || echo "No standard entry point found, skipping"

      - name: Count skills
        if: always()
        run: |
          total=$(find skills/ -name "*.py" | wc -l)
          echo "Total skills: $total"
          find skills/ -name "*.py" | sort
